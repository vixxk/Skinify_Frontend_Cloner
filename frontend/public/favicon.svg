<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <style>
    .s-group {
      display: block;
    }
    @media (max-width: 24px), (max-height: 24px) {
      .s-group {
        display: none;
      }
    }
  </style>
  <!-- Outer Hexagon Outline -->
  <polygon points="50,8 86.37,29 86.37,71 50,92 13.63,71 13.63,29" fill="none" stroke="#AAFF00" stroke-width="8" stroke-linejoin="miter" />
  
  <!-- S Cutout Group (visible above 24px) -->
  <g class="s-group">
    <!-- A mask to subtract the 'S' shape from the inner filled hexagon -->
    <defs>
      <mask id="s-mask">
        <!-- Everything white is kept -->
        <rect width="100" height="100" fill="white" />
        <!-- Futuristic blocky S cut out -->
        <path d="M35 35 H65 V45 H45 V50 H65 V65 H35 V55 H55 V50 H35 Z" fill="black" />
      </mask>
    </defs>
    <!-- Inner filled hexagon that will have the 'S' cut out of it -->
    <polygon points="50,22 74.25,36 74.25,64 50,78 25.75,64 25.75,36" fill="#AAFF00" mask="url(#s-mask)" />
  </g>
</svg>
